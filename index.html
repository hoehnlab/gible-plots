<script language="javascript">
function Animation(frames, container, interval){
  this.container = container;
  this.img = container.querySelector("img");
  this.slider = container.querySelector(".anim-slider");
  this.loopForm = container.querySelector(".anim-state");

  this.interval = interval;
  this.current_frame = 0;
  this.direction = 0;
  this.timer = null;

  this.frames = frames.map(src => {
    const img = new Image();
    img.src = src;
    return img;
  });

  this.slider.max = this.frames.length - 1;

  this.attachEvents();
  this.set_frame(0);
}

Animation.prototype.attachEvents = function() {
  // Slider
  this.slider.addEventListener("input", (e) => {
    this.set_frame(parseInt(e.target.value));
  });

  // Buttons
  this.container.querySelectorAll("[data-action]").forEach(btn => {
    btn.addEventListener("click", () => {
      const action = btn.dataset.action;
      this.handleAction(action);
    });
  });
};

Animation.prototype.handleAction = function(action) {
  switch(action) {
    case "play": this.play_animation(); break;
    case "pause": this.pause_animation(); break;
    case "reverse": this.reverse_animation(); break;
    case "next": this.next_frame(); break;
    case "prev": this.previous_frame(); break;
    case "first": this.first_frame(); break;
    case "last": this.last_frame(); break;
    case "faster": this.faster(); break;
    case "slower": this.slower(); break;
  }
};

Animation.prototype.get_loop_state = function(){
  const checked = this.loopForm.querySelector("input:checked");
  return checked ? checked.value : "loop";
};

Animation.prototype.set_frame = function(frame){
  this.current_frame = frame;
  this.img.src = this.frames[frame].src;
  this.slider.value = frame;
};

Animation.prototype.next_frame = function(){
  this.set_frame(Math.min(this.frames.length - 1, this.current_frame + 1));
};

Animation.prototype.previous_frame = function(){
  this.set_frame(Math.max(0, this.current_frame - 1));
};

Animation.prototype.first_frame = function(){
  this.set_frame(0);
};

Animation.prototype.last_frame = function(){
  this.set_frame(this.frames.length - 1);
};

Animation.prototype.slower = function(){
  this.interval /= 0.7;
  this._restart_if_running();
};

Animation.prototype.faster = function(){
  this.interval *= 0.7;
  this._restart_if_running();
};

Animation.prototype._restart_if_running = function(){
  if(this.direction > 0) this.play_animation();
  else if(this.direction < 0) this.reverse_animation();
};

Animation.prototype.anim_step_forward = function(){
  this.current_frame++;
  if(this.current_frame < this.frames.length){
    this.set_frame(this.current_frame);
  } else {
    const state = this.get_loop_state();
    if(state === "loop"){
      this.first_frame();
    } else if(state === "reflect"){
      this.last_frame();
      this.reverse_animation();
    } else {
      this.pause_animation();
      this.last_frame();
    }
  }
};

Animation.prototype.anim_step_reverse = function(){
  this.current_frame--;
  if(this.current_frame >= 0){
    this.set_frame(this.current_frame);
  } else {
    const state = this.get_loop_state();
    if(state === "loop"){
      this.last_frame();
    } else if(state === "reflect"){
      this.first_frame();
      this.play_animation();
    } else {
      this.pause_animation();
      this.first_frame();
    }
  }
};

Animation.prototype.pause_animation = function(){
  this.direction = 0;
  if (this.timer){
    clearInterval(this.timer);
    this.timer = null;
  }
};

Animation.prototype.play_animation = function(){
  this.pause_animation();
  this.direction = 1;
  this.timer = setInterval(() => this.anim_step_forward(), this.interval);
};

Animation.prototype.reverse_animation = function(){
  this.pause_animation();
  this.direction = -1;
  this.timer = setInterval(() => this.anim_step_reverse(), this.interval);
};
</script>

  <!-- Navigation JS -->
 <script>
const btnSim = document.getElementById('nav-simulation');
const btnPlot = document.getElementById('nav-plot');
const plotSubnav = document.getElementById('plot-subnav');

const views = {
  simulation: document.getElementById('view-simulation'),
  plot: document.getElementById('view-plot')
};

const plotViews = {
  sim_animation: document.getElementById('view-sim-animation'),
  sim_true_tree: document.getElementById('view-sim-true_tree'),
  sim_gible_tree: document.getElementById('view-sim-gible_tree'),
  tonsil_gible_tree: document.getElementById('view-tonsil-gible_tree')
};

// Allowed subviews per group
const subnavConfig = {
  sim: ["animation", "true_tree", "gible_tree"],
  tonsil: ["gible_tree"]
};

const navToNiceNames = {
  animation: "Animation",
  true_tree: "True Tree",
  gible_tree: "Gible Tree"
};

function clearTopNav() {
  btnSim.classList.remove('active');
  btnPlot.classList.remove('active');
  Object.values(views).forEach(v => v.classList.remove('active'));
}

function setPlotView(group, view) {
  Object.values(plotViews).forEach(v => v.classList.remove('active'));

  const key = `${group}_${view}`;
  const container = plotViews[key];

  if (container) {
    container.classList.add("active");

    const iframe = container.querySelector("iframe");

    // Lazy load: only set src once
    if (iframe && !iframe.src) {
      iframe.src = iframe.dataset.src;
    }
  }

  // update subnav active state
  document.querySelectorAll("#plot-subnav button").forEach(btn => {
    const match =
      btn.dataset.group === group &&
      btn.dataset.view === view;
    btn.classList.toggle('active', match);
  });
}

function renderSubnav(group) {
  plotSubnav.innerHTML = "";

  subnavConfig[group].forEach(view => {
    const btn = document.createElement("button");
    btn.dataset.group = group;
    btn.dataset.view = view;
    btn.textContent = navToNiceNames[view];

    btn.addEventListener("click", () => {
      setRoute(group, view);
    });

    plotSubnav.appendChild(btn);
  });
}

function preloadPlot(group, view) {
  const key = `${group}_${view}`;
  const container = plotViews[key];
  const iframe = container?.querySelector("iframe");

  if (iframe && !iframe.src) {
    iframe.src = iframe.dataset.src;
  }
}

function setRoute(group, view = null) {
  clearTopNav();
  plotSubnav.classList.add("hidden");

  // --------------------
  // SIMULATION MODE
  // --------------------
  var defaultView = "animation";
  if (group === "sim") {
    views.simulation.classList.add("active");
    views.plot.classList.remove("active");
    btnSim.classList.add("active");
    // location.hash = "sim/animation";
    // return;
  } else {
    btnPlot.classList.add("active");
    views.plot.classList.add("active");
    defaultView = "gible_tree";
  }

  const activeGroup = group;
  const activeView = view || defaultView;

  plotSubnav.classList.remove("hidden");
  renderSubnav(activeGroup);
  setPlotView(activeGroup, activeView);

  location.hash = `${activeGroup}/${activeView}`;
}

function parseHash() {
  const hash = location.hash.replace("#", "");
  if (!hash || hash === "sim/animation") {
    setRoute("sim", "animation");
    return;
  }

  const [group, view] = hash.split("/");

  if (group === "sim" || group === "tonsil") {
    setRoute(group, view);
  }
}

// --------------------
// EVENT BINDINGS
// --------------------

window.addEventListener("load", parseHash);
window.addEventListener("hashchange", parseHash);

btnSim.addEventListener("click", () => setRoute("sim"));
btnPlot.addEventListener("click", () => setRoute("tonsil", "gible_tree"));
</script>
